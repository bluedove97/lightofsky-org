<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 — 하늘의 빛 교회</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: { DEFAULT: '#3D8EC9', dark: '#2B6E9E', light: '#6BAED6', pale: '#D0E9F7' }
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; }
  .tab-btn.active { background: #3D8EC9; color: white; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-brand text-white shadow-lg">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold">하늘의 빛 교회 — 관리자</h1>
    <span class="text-sm bg-brand-dark px-3 py-1 rounded-full">개발 모드</span>
  </div>
</header>

<!-- Tabs -->
<nav class="bg-white border-b shadow-sm sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-4 flex gap-1 py-2">
    <button class="tab-btn active px-4 py-2 rounded font-medium text-sm transition-colors" onclick="switchTab('notices')">공지사항</button>
    <button class="tab-btn px-4 py-2 rounded font-medium text-sm transition-colors text-gray-600 hover:bg-gray-100" onclick="switchTab('news')">교회 소식</button>
    <button class="tab-btn px-4 py-2 rounded font-medium text-sm transition-colors text-gray-600 hover:bg-gray-100" onclick="switchTab('gallery')">사진 앨범</button>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6">

  <!-- 공지사항 탭 -->
  <section id="tab-notices">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-gray-800">공지사항 관리</h2>
      <button onclick="openNoticeModal()" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">+ 새 공지사항</button>
    </div>
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b">
          <tr>
            <th class="text-left px-4 py-3 text-gray-600 font-medium w-8">#</th>
            <th class="text-left px-4 py-3 text-gray-600 font-medium">제목</th>
            <th class="text-left px-4 py-3 text-gray-600 font-medium w-16">고정</th>
            <th class="text-left px-4 py-3 text-gray-600 font-medium w-32">등록일</th>
            <th class="px-4 py-3 w-24"></th>
          </tr>
        </thead>
        <tbody id="notices-tbody">
          <tr><td colspan="5" class="text-center py-8 text-gray-400">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 교회 소식 탭 -->
  <section id="tab-news" class="hidden">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-gray-800">교회 소식 관리</h2>
      <button onclick="openNewsModal()" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">+ 새 소식</button>
    </div>
    <div class="grid gap-4" id="news-grid">
      <p class="text-center py-8 text-gray-400">불러오는 중...</p>
    </div>
  </section>

  <!-- 사진 앨범 탭 -->
  <section id="tab-gallery" class="hidden">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold text-gray-800">사진 앨범 관리</h2>
      <button onclick="openGalleryModal()" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">+ 사진 업로드</button>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="gallery-grid">
      <p class="text-center py-8 text-gray-400 col-span-4">불러오는 중...</p>
    </div>
  </section>

</main>

<!-- 공지사항 모달 -->
<div class="modal-overlay" id="notice-modal">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
    <h3 class="text-lg font-bold mb-4" id="notice-modal-title">공지사항 등록</h3>
    <input type="hidden" id="notice-id">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
        <input id="notice-title" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand" placeholder="제목을 입력하세요">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">내용</label>
        <textarea id="notice-content" rows="6" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand" placeholder="내용을 입력하세요"></textarea>
      </div>
      <div class="flex items-center gap-2">
        <input id="notice-pinned" type="checkbox" class="w-4 h-4 accent-brand">
        <label class="text-sm text-gray-700">상단 고정</label>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeModal('notice-modal')" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition-colors">취소</button>
      <button onclick="saveNotice()" class="px-4 py-2 text-sm bg-brand hover:bg-brand-dark text-white rounded-lg transition-colors">저장</button>
    </div>
  </div>
</div>

<!-- 교회 소식 모달 -->
<div class="modal-overlay" id="news-modal">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
    <h3 class="text-lg font-bold mb-4" id="news-modal-title">교회 소식 등록</h3>
    <input type="hidden" id="news-id">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
        <input id="news-title" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">내용</label>
        <textarea id="news-content" rows="6" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이미지 URL (선택)</label>
        <input id="news-image" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand" placeholder="https://...">
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeModal('news-modal')" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition-colors">취소</button>
      <button onclick="saveNews()" class="px-4 py-2 text-sm bg-brand hover:bg-brand-dark text-white rounded-lg transition-colors">저장</button>
    </div>
  </div>
</div>

<!-- 갤러리 업로드 모달 -->
<div class="modal-overlay" id="gallery-modal">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 p-6">
    <h3 class="text-lg font-bold mb-4">사진 업로드</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
        <input id="gallery-title" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">카테고리</label>
        <select id="gallery-category" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
          <option value="all">전체</option>
          <option value="worship">예배</option>
          <option value="events">행사</option>
          <option value="retreats">수련회</option>
          <option value="service">봉사</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">사진 파일</label>
        <input id="gallery-file" type="file" accept="image/*" class="w-full text-sm text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-brand-pale file:text-brand file:font-medium hover:file:bg-brand-light">
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closeModal('gallery-modal')" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50 transition-colors">취소</button>
      <button onclick="uploadGallery()" class="px-4 py-2 text-sm bg-brand hover:bg-brand-dark text-white rounded-lg transition-colors">업로드</button>
    </div>
  </div>
</div>

<script>
let API = '';
fetch('/config.json').then(r => r.json()).then(cfg => {
  API = cfg.API_BASE;
  loadNotices();
});

// --- Tab ---
function switchTab(name) {
  ['notices','news','gallery'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== name);
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const names = ['notices','news','gallery'];
    btn.classList.toggle('active', names[i] === name);
    btn.classList.toggle('text-gray-600', names[i] !== name);
  });
  if (name === 'notices') loadNotices();
  if (name === 'news') loadNews();
  if (name === 'gallery') loadGallery();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function formatDate(str) {
  return new Date(str).toLocaleDateString('ko-KR');
}

// --- Notices ---
async function loadNotices() {
  const res = await fetch(`${API}/api/notices?limit=50`);
  const data = await res.json();
  const tbody = document.getElementById('notices-tbody');
  if (!data.items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">등록된 공지사항이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = data.items.map(n => `
    <tr class="border-b hover:bg-gray-50">
      <td class="px-4 py-3 text-gray-500">${n.id}</td>
      <td class="px-4 py-3 font-medium">${n.title}</td>
      <td class="px-4 py-3">${n.is_pinned ? '<span class="text-brand text-xs font-bold">고정</span>' : ''}</td>
      <td class="px-4 py-3 text-gray-500 text-xs">${formatDate(n.created_at)}</td>
      <td class="px-4 py-3 text-right">
        <button onclick="editNotice(${n.id})" class="text-xs text-brand hover:underline mr-3">수정</button>
        <button onclick="deleteNotice(${n.id})" class="text-xs text-red-500 hover:underline">삭제</button>
      </td>
    </tr>
  `).join('');
}

function openNoticeModal(id) {
  document.getElementById('notice-id').value = '';
  document.getElementById('notice-title').value = '';
  document.getElementById('notice-content').value = '';
  document.getElementById('notice-pinned').checked = false;
  document.getElementById('notice-modal-title').textContent = '공지사항 등록';
  document.getElementById('notice-modal').classList.add('open');
}

async function editNotice(id) {
  const res = await fetch(`${API}/api/notices/${id}`);
  const n = await res.json();
  document.getElementById('notice-id').value = n.id;
  document.getElementById('notice-title').value = n.title;
  document.getElementById('notice-content').value = n.content;
  document.getElementById('notice-pinned').checked = !!n.is_pinned;
  document.getElementById('notice-modal-title').textContent = '공지사항 수정';
  document.getElementById('notice-modal').classList.add('open');
}

async function saveNotice() {
  const id = document.getElementById('notice-id').value;
  const body = {
    title: document.getElementById('notice-title').value,
    content: document.getElementById('notice-content').value,
    is_pinned: document.getElementById('notice-pinned').checked ? 1 : 0,
  };
  const url = id ? `${API}/api/notices/${id}` : `${API}/api/notices`;
  const method = id ? 'PUT' : 'POST';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  closeModal('notice-modal');
  loadNotices();
}

async function deleteNotice(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await fetch(`${API}/api/notices/${id}`, { method: 'DELETE' });
  loadNotices();
}

// --- News ---
async function loadNews() {
  const res = await fetch(`${API}/api/news`);
  const data = await res.json();
  const grid = document.getElementById('news-grid');
  if (!data.length) {
    grid.innerHTML = '<p class="text-center py-8 text-gray-400">등록된 소식이 없습니다</p>';
    return;
  }
  grid.innerHTML = data.map(n => `
    <div class="bg-white rounded-xl shadow p-4 flex gap-4">
      ${n.image_url ? `<img src="${n.image_url}" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">` : '<div class="w-20 h-20 bg-gray-100 rounded-lg flex-shrink-0 flex items-center justify-center text-gray-300 text-xs">없음</div>'}
      <div class="flex-1 min-w-0">
        <h4 class="font-bold text-sm mb-1 truncate">${n.title}</h4>
        <p class="text-xs text-gray-500 line-clamp-2">${n.content}</p>
        <p class="text-xs text-gray-400 mt-2">${formatDate(n.created_at)}</p>
      </div>
      <div class="flex flex-col gap-1 flex-shrink-0">
        <button onclick="editNews(${n.id})" class="text-xs text-brand hover:underline">수정</button>
        <button onclick="deleteNews(${n.id})" class="text-xs text-red-500 hover:underline">삭제</button>
      </div>
    </div>
  `).join('');
}

function openNewsModal() {
  document.getElementById('news-id').value = '';
  document.getElementById('news-title').value = '';
  document.getElementById('news-content').value = '';
  document.getElementById('news-image').value = '';
  document.getElementById('news-modal-title').textContent = '교회 소식 등록';
  document.getElementById('news-modal').classList.add('open');
}

async function editNews(id) {
  const res = await fetch(`${API}/api/news/${id}`);
  const n = await res.json();
  document.getElementById('news-id').value = n.id;
  document.getElementById('news-title').value = n.title;
  document.getElementById('news-content').value = n.content;
  document.getElementById('news-image').value = n.image_url || '';
  document.getElementById('news-modal-title').textContent = '교회 소식 수정';
  document.getElementById('news-modal').classList.add('open');
}

async function saveNews() {
  const id = document.getElementById('news-id').value;
  const body = {
    title: document.getElementById('news-title').value,
    content: document.getElementById('news-content').value,
    image_url: document.getElementById('news-image').value || null,
  };
  const url = id ? `${API}/api/news/${id}` : `${API}/api/news`;
  const method = id ? 'PUT' : 'POST';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  closeModal('news-modal');
  loadNews();
}

async function deleteNews(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await fetch(`${API}/api/news/${id}`, { method: 'DELETE' });
  loadNews();
}

// --- Gallery ---
async function loadGallery() {
  const res = await fetch(`${API}/api/gallery`);
  const data = await res.json();
  const grid = document.getElementById('gallery-grid');
  if (!data.length) {
    grid.innerHTML = '<p class="text-center py-8 text-gray-400 col-span-4">업로드된 사진이 없습니다</p>';
    return;
  }
  grid.innerHTML = data.map(g => `
    <div class="bg-white rounded-xl shadow overflow-hidden group relative">
      <img src="${API}${g.image_url}" class="w-full h-40 object-cover">
      <div class="p-2">
        <p class="text-xs font-medium truncate">${g.title}</p>
        <p class="text-xs text-gray-400">${g.category}</p>
      </div>
      <button onclick="deleteGallery(${g.id})" class="absolute top-2 right-2 bg-red-500 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">삭제</button>
    </div>
  `).join('');
}

function openGalleryModal() {
  document.getElementById('gallery-title').value = '';
  document.getElementById('gallery-category').value = 'all';
  document.getElementById('gallery-file').value = '';
  document.getElementById('gallery-modal').classList.add('open');
}

async function uploadGallery() {
  const file = document.getElementById('gallery-file').files[0];
  if (!file) { alert('파일을 선택하세요'); return; }
  const fd = new FormData();
  fd.append('title', document.getElementById('gallery-title').value);
  fd.append('category', document.getElementById('gallery-category').value);
  fd.append('file', file);
  await fetch(`${API}/api/gallery`, { method: 'POST', body: fd });
  closeModal('gallery-modal');
  loadGallery();
}

async function deleteGallery(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await fetch(`${API}/api/gallery/${id}`, { method: 'DELETE' });
  loadGallery();
}

</script>
</body>
</html>
